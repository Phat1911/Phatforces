name: Deploy To Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: photcotregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push backend image
        run: |
          docker build -t photcotregistry.azurecr.io/photcot-backend:latest ./backend
          docker push photcotregistry.azurecr.io/photcot-backend:latest

      - name: Build & push frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=https://api.phatforces.me/api/v1 \
            --build-arg NEXT_PUBLIC_UPLOADS_URL=https://api.phatforces.me \
            -t photcotregistry.azurecr.io/photcot-frontend:latest \
            ./frontend
          docker push photcotregistry.azurecr.io/photcot-frontend:latest

      - name: Deploy on Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            ACR="photcotregistry.azurecr.io"
            echo "${{ secrets.ACR_PASSWORD }}" | docker login $ACR -u "${{ secrets.ACR_USERNAME }}" --password-stdin

            docker pull $ACR/photcot-backend:latest
            docker stop photcot-backend && docker rm photcot-backend
            docker run -d --name photcot-backend --restart unless-stopped --network host \
              --env-file /home/azureuser/photcot/backend/.env \
              -e PORT=8080 \
              -v /home/azureuser/photcot/backend/uploads:/app/uploads \
              $ACR/photcot-backend:latest

            docker pull $ACR/photcot-frontend:latest
            docker stop photcot-frontend && docker rm photcot-frontend
            docker run -d --name photcot-frontend --restart unless-stopped --network host \
              -e NEXT_PUBLIC_API_URL=https://api.phatforces.me/api/v1 \
              -e NEXT_PUBLIC_UPLOADS_URL=https://api.phatforces.me \
              -e NODE_ENV=production \
              $ACR/photcot-frontend:latest

            sleep 3
            curl -s http://localhost:8080/api/health
            echo ""
            docker ps --format "table {{.Names}}\t{{.Status}}"
