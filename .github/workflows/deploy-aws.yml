name: Deploy To Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: photcotregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push backend image
        run: |
          docker build -t photcotregistry.azurecr.io/photcot-backend:latest ./backend
          docker push photcotregistry.azurecr.io/photcot-backend:latest

      - name: Build & push frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=https://api.phatforces.me/api/v1 \
            --build-arg NEXT_PUBLIC_UPLOADS_URL=https://api.phatforces.me \
            -t photcotregistry.azurecr.io/photcot-frontend:latest \
            ./frontend
          docker push photcotregistry.azurecr.io/photcot-frontend:latest

      - name: Deploy on Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            ACR="photcotregistry.azurecr.io"
            REPO="/home/azureuser/photcot"
            ENV_FILE="$REPO/backend/.env"
            NGINX_CONF="$REPO/deploy/nginx/phatforces.conf"
            SSL_DIR="$REPO/deploy/nginx/ssl"

            echo "${{ secrets.ACR_PASSWORD }}" | docker login $ACR -u "${{ secrets.ACR_USERNAME }}" --password-stdin

            # Pull latest code so nginx conf / docker-compose files are up to date
            if [[ -d "$REPO/.git" ]]; then
              git -C "$REPO" pull origin main || true
            fi

            # Ensure shared Docker network exists (required for nginx hostname resolution)
            docker network create photcot-net 2>/dev/null || true

            # --- Stop ALL old containers regardless of name scheme ---
            for c in backend photcot-backend frontend photcot-frontend nginx photcot-nginx; do
              docker stop $c 2>/dev/null || true
              docker rm   $c 2>/dev/null || true
            done

            # --- Backend ---
            docker pull $ACR/photcot-backend:latest
            if [[ -f "$ENV_FILE" ]]; then
              docker run -d --name backend --restart unless-stopped \
                --network photcot-net \
                --env-file "$ENV_FILE" \
                -e PORT=8080 \
                -v "$REPO/backend/uploads:/app/uploads" \
                $ACR/photcot-backend:latest
            else
              echo "WARNING: $ENV_FILE not found — backend started without env file. Create it and redeploy."
              docker run -d --name backend --restart unless-stopped \
                --network photcot-net \
                -e PORT=8080 \
                -v "$REPO/backend/uploads:/app/uploads" \
                $ACR/photcot-backend:latest
            fi

            # --- Frontend ---
            docker pull $ACR/photcot-frontend:latest
            docker run -d --name frontend --restart unless-stopped \
              --network photcot-net \
              -e NEXT_PUBLIC_API_URL=https://api.phatforces.me/api/v1 \
              -e NEXT_PUBLIC_UPLOADS_URL=https://api.phatforces.me \
              -e NODE_ENV=production \
              $ACR/photcot-frontend:latest

            # --- Nginx ---
            docker run -d --name nginx --restart unless-stopped \
              --network photcot-net \
              -p 80:80 -p 443:443 \
              -v "$NGINX_CONF:/etc/nginx/conf.d/default.conf:ro" \
              -v "$SSL_DIR:/etc/nginx/ssl:ro" \
              nginx:1.27-alpine

            sleep 5
            curl -sf http://localhost:8080/api/health && echo " — backend OK"
            echo ""
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"
